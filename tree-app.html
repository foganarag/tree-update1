<!DOCTYPE html>
<html>
<head>
    <title>Abtirsi - Clan Tree Viewer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #d4c9a8 0%, #e8e0c8 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #fdf8ed;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .header {
            background: #8b7355;
            color: #fdf8ed;
            padding: 20px 30px;
            border-bottom: 3px solid #d4a843;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .toolbar {
            background: #efe6d2;
            padding: 15px 30px;
            border-bottom: 1px solid #d4c9a8;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
        }
        
        .toolbar button {
            background: #8b7355;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        
        .toolbar button:hover {
            background: #6b5740;
        }
        
        .toolbar .stats {
            color: #6b5740;
            font-size: 14px;
        }
        
        .tree-container {
            padding: 30px;
            max-height: 70vh;
            overflow-y: auto;
            background: #fdf8ed;
            -webkit-overflow-scrolling: touch;
        }
        
        .tree {
            list-style: none;
            margin-left: 0;
            padding-left: 0;
        }
        
        .tree li {
            list-style: none;
            margin: 0;
            padding: 0;
            position: relative;
        }
        
        .tree li .node {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 12px;
            margin: 4px 0;
            background: #fffaf0;
            border-radius: 8px;
            border: 1px solid #e0d5b5;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            touch-action: manipulation;
        }
        
        .tree li .node:active {
            background: #e8ddc5;
            transform: scale(0.99);
        }
        
        .tree li .node.long-press-active {
            background: #d4a843;
            border-color: #8b7355;
            color: white;
        }
        
        .tree li .node.long-press-active .clan-name {
            color: white;
        }
        
        .tree li .node:hover {
            background: #f5edd5;
            border-color: #d4a843;
            transform: translateX(5px);
        }
        
        .tree li .node .toggle {
            font-size: 14px;
            font-weight: bold;
            color: #8b7355;
            width: 20px;
            text-align: center;
            cursor: pointer;
            touch-action: manipulation;
        }
        
        .tree li .node .clan-name {
            flex: 1;
            font-weight: 600;
            color: #5c4a2e;
        }
        
        .tree li .node .clan-name strong {
            color: #3d2e1a;
        }
        
        .tree li .node .badge {
            background: #d4a843;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
        }
        
        .tree li .children {
            margin-left: 30px;
            padding-left: 20px;
            border-left: 2px dashed #d4c9a8;
            display: block;
        }
        
        .tree li .children.collapsed {
            display: none;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            background: #fdf8ed;
            padding: 30px;
            border-radius: 12px;
            width: 400px;
            max-width: 90%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .modal-content h3 {
            margin-bottom: 20px;
            color: #8b7355;
        }
        
        .modal-content input, .modal-content select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #d4c9a8;
            border-radius: 6px;
            font-size: 16px;
            background: #fffaf0;
        }
        
        .modal-content button {
            padding: 12px 20px;
            margin-right: 10px;
            margin-top: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }
        
        .modal-content button:first-of-type {
            background: #8b7355;
            color: white;
        }
        
        .modal-content button:last-of-type {
            background: #d4c9a8;
        }
        
        .status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 8px;
            color: #0f0;
            font-size: 12px;
            font-family: monospace;
            z-index: 100;
        }
        
        .root-actions {
            margin-top: 20px;
            text-align: center;
        }
        
        .btn-add-root {
            background: #d4a843;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            margin: 10px;
            font-size: 16px;
            touch-action: manipulation;
        }
        
        .btn-add-root:hover {
            background: #b8922a;
        }
        
        .btn-add-root:active {
            transform: scale(0.97);
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #8b7355;
        }
        
        /* Instruction for mobile users */
        .mobile-instruction {
            background: #efe6d2;
            padding: 10px 15px;
            text-align: center;
            font-size: 12px;
            color: #6b5740;
            border-bottom: 1px solid #d4c9a8;
        }
        
        .mobile-instruction strong {
            background: #d4a843;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            margin: 0 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🌳 Somali Abtirsi - Clan Tree Viewer</h1>
        <p>Tap to expand/collapse • Press and hold on any clan to add a child branch</p>
    </div>
    
    <div class="mobile-instruction">
        📱 On iPhone/Android: <strong>Press and hold</strong> on any clan name to add a child branch
    </div>
    
    <div class="toolbar">
        <div>
            <button id="expandAllBtn">📂 Expand All</button>
            <button id="collapseAllBtn">📁 Collapse All</button>
            <button id="refreshBtn">🔄 Refresh</button>
        </div>
        <div class="stats" id="stats">Loading...</div>
    </div>
    
    <div class="tree-container" id="treeContainer">
        <div class="loading">Loading clan tree from database...</div>
    </div>
</div>

<div id="nodeModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Add New Clan</h3>
        <input type="text" id="nodeNameInput" placeholder="Clan name (e.g., 'Reer Xirsi')" autocomplete="off">
        <div>
            <button id="modalConfirm">Add</button>
            <button id="modalCancel">Cancel</button>
        </div>
    </div>
</div>

<div class="status" id="status">
    ⚡ Ready
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    (function() {
        // ========== REPLACE THESE WITH YOUR ACTUAL KEYS ==========
        const SUPABASE_URL = 'https://dzgaaoawkvqjuoecytko.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR6Z2Fhb2F3a3ZxanVvZWN5dGtvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5NTg3NDYsImV4cCI6MjA5NDUzNDc0Nn0.dO9kp9u23s0MnSzVZ8cIQYCzD926RdrEaMBG0POxJ8k';
        // ==========================================================
        
        let appSupabase = null;
        let appClanData = [];
        let longPressTimer = null;
        let activeNode = null;
        
        // Initialize
        function init() {
            if (SUPABASE_URL === 'YOUR_SUPABASE_URL_HERE' || SUPABASE_ANON_KEY === 'YOUR_SUPABASE_ANON_KEY_HERE') {
                document.getElementById('treeContainer').innerHTML = '<div class="loading" style="color:red;">❌ Please configure SUPABASE_URL and SUPABASE_ANON_KEY in the code</div>';
                return;
            }
            
            appSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            loadClanData();
            
            // Setup button handlers
            document.getElementById('expandAllBtn').onclick = expandAll;
            document.getElementById('collapseAllBtn').onclick = collapseAll;
            document.getElementById('refreshBtn').onclick = function() { loadClanData(); };
            
            // Modal handlers
            document.getElementById('modalConfirm').onclick = onModalConfirm;
            document.getElementById('modalCancel').onclick = function() {
                document.getElementById('nodeModal').style.display = 'none';
                clearLongPress();
            };
            
            // Close modal on outside click
            window.onclick = function(event) {
                const modal = document.getElementById('nodeModal');
                if (event.target === modal) {
                    modal.style.display = 'none';
                    clearLongPress();
                }
            };
        }
        
        function clearLongPress() {
            if (longPressTimer) {
                clearTimeout(longPressTimer);
                longPressTimer = null;
            }
            if (activeNode) {
                activeNode.classList.remove('long-press-active');
                activeNode = null;
            }
        }
        
        function setupLongPress(nodeElement, clanName, fullPath) {
            // Touch start (for mobile)
            nodeElement.addEventListener('touchstart', function(e) {
                clearLongPress();
                activeNode = nodeElement;
                longPressTimer = setTimeout(function() {
                    if (activeNode) {
                        activeNode.classList.add('long-press-active');
                        openAddChildModal(clanName, fullPath);
                        // Vibrate if supported (optional)
                        if (navigator.vibrate) navigator.vibrate(50);
                    }
                    clearLongPress();
                }, 500); // 500ms long press
            });
            
            // Touch end (cancel long press if finger lifted early)
            nodeElement.addEventListener('touchend', function(e) {
                clearLongPress();
            });
            
            // Touch move (cancel if finger moves)
            nodeElement.addEventListener('touchmove', function(e) {
                clearLongPress();
            });
            
            // Mouse down (for right-click on desktop)
            nodeElement.addEventListener('contextmenu', function(e) {
                e.preventDefault();
                clearLongPress();
                openAddChildModal(clanName, fullPath);
                return false;
            });
        }
        
        async function loadClanData() {
            try {
                const statusDiv = document.getElementById('status');
                const statsDiv = document.getElementById('stats');
                const container = document.getElementById('treeContainer');
                
                statusDiv.innerHTML = '📡 Loading...';
                statsDiv.innerHTML = 'Loading...';
                container.innerHTML = '<div class="loading">Loading clan tree from database...</div>';
                
                const { data, error } = await appSupabase
                    .from('clan_paths')
                    .select('*')
                    .order('level_1', { ascending: true });
                
                if (error) throw error;
                
                appClanData = data || [];
                statsDiv.innerHTML = `📊 ${appClanData.length} clan paths loaded`;
                statusDiv.innerHTML = '✅ Loaded ' + appClanData.length + ' paths';
                
                renderTree();
                
                // After rendering, collapse all nodes by default
                collapseAll();
                
                setTimeout(() => {
                    statusDiv.style.opacity = '0.5';
                }, 2000);
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('treeContainer').innerHTML = '<div class="loading" style="color:red;">❌ Error: ' + error.message + '</div>';
                document.getElementById('status').innerHTML = '❌ Error';
            }
        }
        
        function buildTreeStructure() {
            const tree = {};
            
            appClanData.forEach(path => {
                const levels = [];
                if (path.level_1) levels.push(path.level_1);
                if (path.level_2) levels.push(path.level_2);
                if (path.level_3) levels.push(path.level_3);
                if (path.level_4) levels.push(path.level_4);
                if (path.level_5) levels.push(path.level_5);
                if (path.level_6) levels.push(path.level_6);
                if (path.level_7) levels.push(path.level_7);
                
                let current = tree;
                levels.forEach((level, index) => {
                    if (!current[level]) {
                        current[level] = {
                            name: level,
                            fullPath: levels.slice(0, index + 1).join(' > '),
                            children: {}
                        };
                    }
                    current = current[level].children;
                });
            });
            
            return tree;
        }
        
        function renderTree() {
            const container = document.getElementById('treeContainer');
            const tree = buildTreeStructure();
            const rootNodes = Object.values(tree);
            
            if (rootNodes.length === 0) {
                container.innerHTML = '<div class="loading">No clan data found. Please add some using the claim form first.</div>';
                return;
            }
            
            let html = '<ul class="tree">';
            rootNodes.forEach(node => {
                html += renderNode(node, 0);
            });
            html += '</ul>';
            
            html += '<div class="root-actions">';
            html += '<button class="btn-add-root" id="addRootBtn">➕ Add New Root Clan</button>';
            html += '</div>';
            
            container.innerHTML = html;
            
            // Attach click handlers for expand/collapse
            document.querySelectorAll('.toggle').forEach(toggle => {
                toggle.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const children = this.closest('.node').nextElementSibling;
                    if (children) {
                        children.classList.toggle('collapsed');
                        this.textContent = children.classList.contains('collapsed') ? '▶' : '▼';
                    }
                });
            });
            
            // Attach long-press and right-click handlers to nodes
            document.querySelectorAll('.node').forEach(node => {
                const clanName = node.querySelector('.clan-name').textContent;
                const fullPath = node.getAttribute('data-fullpath') || clanName;
                setupLongPress(node, clanName, fullPath);
            });
            
            // Add root button handler
            const addRootBtn = document.getElementById('addRootBtn');
            if (addRootBtn) {
                addRootBtn.addEventListener('click', function() {
                    openAddRootModal();
                });
                // Also support long-press on button (just in case)
                addRootBtn.addEventListener('contextmenu', function(e) {
                    e.preventDefault();
                    openAddRootModal();
                });
            }
        }
        
        function renderNode(node, level) {
            const hasChildren = Object.keys(node.children).length > 0;
            const indent = level * 20;
            
            return `
                <li>
                    <div class="node" data-fullpath="${escapeHtml(node.fullPath)}" style="margin-left: ${indent}px;">
                        ${hasChildren ? '<span class="toggle">▼</span>' : '<span class="toggle" style="opacity:0.3;">●</span>'}
                        <span class="clan-name"><strong>${escapeHtml(node.name)}</strong></span>
                        ${hasChildren ? `<span class="badge">${Object.keys(node.children).length}</span>` : ''}
                    </div>
                    ${hasChildren ? `<div class="children"><ul class="tree">${Object.values(node.children).map(child => renderNode(child, level + 1)).join('')}</ul></div>` : ''}
                </li>
            `;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function openAddRootModal() {
            document.getElementById('modalTitle').innerText = 'Add New Root Clan';
            document.getElementById('nodeNameInput').value = '';
            document.getElementById('nodeModal').style.display = 'flex';
            window._pendingParentPath = null;
            clearLongPress();
        }
        
        function openAddChildModal(clanName, fullPath) {
            document.getElementById('modalTitle').innerText = `Add Child to ${clanName}`;
            document.getElementById('nodeNameInput').value = '';
            document.getElementById('nodeModal').style.display = 'flex';
            window._pendingParentPath = fullPath;
            clearLongPress();
        }
        
        async function onModalConfirm() {
            const newNodeName = document.getElementById('nodeNameInput').value.trim();
            const parentPath = window._pendingParentPath;
            
            if (!newNodeName) {
                alert('Please enter a clan name');
                return;
            }
            
            document.getElementById('nodeModal').style.display = 'none';
            
            try {
                const statusDiv = document.getElementById('status');
                statusDiv.innerHTML = '💾 Saving...';
                
                let newPathArray = [];
                
                if (parentPath && parentPath !== '') {
                    newPathArray = parentPath.split(' > ');
                    newPathArray.push(newNodeName);
                } else {
                    newPathArray = [newNodeName];
                }
                
                const newRow = {
                    level_1: newPathArray[0] || null,
                    level_2: newPathArray[1] || null,
                    level_3: newPathArray[2] || null,
                    level_4: newPathArray[3] || null,
                    level_5: newPathArray[4] || null,
                    level_6: newPathArray[5] || null,
                    level_7: newPathArray[6] || null
                };
                
                const { error } = await appSupabase.from('clan_paths').insert([newRow]);
                
                if (error) throw error;
                
                statusDiv.innerHTML = '✅ Added! Refreshing...';
                statusDiv.style.color = '#0f0';
                
                await loadClanData();
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('status').innerHTML = '❌ Error: ' + error.message;
                document.getElementById('status').style.color = '#f00';
            }
        }
        
        function expandAll() {
            document.querySelectorAll('.children').forEach(el => {
                el.classList.remove('collapsed');
            });
            document.querySelectorAll('.toggle').forEach(el => {
                if (el.textContent === '▶') el.textContent = '▼';
            });
        }
        
        function collapseAll() {
            document.querySelectorAll('.children').forEach(el => {
                el.classList.add('collapsed');
            });
            document.querySelectorAll('.toggle').forEach(el => {
                if (el.textContent === '▼') el.textContent = '▶';
            });
        }
        
        // Start the app
        init();
    })();
</script>

</body>
</html>
