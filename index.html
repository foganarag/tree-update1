<!DOCTYPE html>
<html>
<head>
    <title>Abtirsi - Somali Clan Genealogy</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #6ba3b5;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #fdf8ed;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .header {
            background: #4a7c8c;
            color: #fdf8ed;
            padding: 20px 30px;
            border-bottom: 3px solid #d4a843;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .toolbar {
            background: #e8e0c8;
            padding: 15px 30px;
            border-bottom: 1px solid #d4c9a8;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
        }
        
        .toolbar button {
            background: #4a7c8c;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        
        .toolbar button:hover {
            background: #3a6270;
        }
        
        .toolbar .stats {
            color: #4a7c8c;
            font-size: 14px;
            font-weight: bold;
        }
        
        .tree-container {
            padding: 30px;
            max-height: 70vh;
            overflow-y: auto;
            background: #fdf8ed;
            -webkit-overflow-scrolling: touch;
        }
        
        .tree {
            list-style: none;
            margin-left: 0;
            padding-left: 0;
        }
        
        .tree li {
            list-style: none;
            margin: 0;
            padding: 0;
            position: relative;
        }
        
        .tree li .node {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 15px;
            margin: 6px 0;
            background: #f5e6ca;
            border-radius: 10px;
            border: 1px solid #d4a843;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            touch-action: manipulation;
        }
        
        .tree li .node:hover {
            background: #eddaae;
            border-color: #b8922a;
            transform: translateX(5px);
        }
        
        .tree li .node .toggle {
            font-size: 14px;
            font-weight: bold;
            color: #4a7c8c;
            width: 24px;
            text-align: center;
            cursor: pointer;
            touch-action: manipulation;
        }
        
        .tree li .node .clan-name {
            flex: 1;
            font-weight: 600;
            color: #3a4a3a;
            font-size: 15px;
        }
        
        .tree li .node .clan-name strong {
            color: #2c3e2c;
        }
        
        .tree li .node .badge {
            background: #d4a843;
            color: white;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
        }
        
        .tree li .node .action-buttons {
            display: none;
            gap: 6px;
        }
        
        .tree li .node:hover .action-buttons {
            display: flex;
        }
        
        .action-btn {
            background: #4a7c8c;
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
            transition: background 0.2s;
        }
        
        .action-btn:hover {
            background: #3a6270;
        }
        
        .action-btn.edit {
            background: #d4a843;
        }
        
        .action-btn.edit:hover {
            background: #b8922a;
        }
        
        .tree li .children {
            margin-left: 30px;
            padding-left: 20px;
            border-left: 2px dashed #d4c9a8;
            display: block;
        }
        
        .tree li .children.collapsed {
            display: none;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            background: #fdf8ed;
            padding: 25px;
            border-radius: 16px;
            width: 350px;
            max-width: 90%;
        }
        
        .modal-content h3 {
            margin-bottom: 15px;
            color: #4a7c8c;
        }
        
        .modal-content input, .modal-content select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #d4c9a8;
            border-radius: 8px;
            font-size: 16px;
            background: white;
        }
        
        .modal-content button {
            padding: 10px 20px;
            margin-right: 10px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .modal-content button:first-of-type {
            background: #4a7c8c;
            color: white;
        }
        
        .modal-content button:last-of-type {
            background: #d4c9a8;
        }
        
        .status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            padding: 8px 16px;
            border-radius: 20px;
            color: #0f0;
            font-size: 12px;
            z-index: 100;
            pointer-events: none;
        }
        
        .mobile-instruction {
            background: #e8e0c8;
            padding: 10px 15px;
            text-align: center;
            font-size: 12px;
            color: #4a7c8c;
            border-bottom: 1px solid #d4c9a8;
        }
        
        .mobile-instruction strong {
            background: #d4a843;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            margin: 0 4px;
        }
        
        .root-actions {
            margin-top: 20px;
            text-align: center;
        }
        
        .btn-add-root {
            background: #d4a843;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            margin: 10px;
            font-size: 14px;
        }
        
        .btn-add-root:hover {
            background: #b8922a;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🌳 Somali Abtirsi - Clan Tree Viewer</h1>
        <p>Tap to expand/collapse • Hover or tap-and-hold for actions (Edit, Add Child, Add Spouse, Add Sibling)</p>
    </div>
    
    <div class="mobile-instruction">
        📱 On mobile: <strong>Tap and hold</strong> on any clan to see action buttons
    </div>
    
    <div class="toolbar">
        <div>
            <button id="expandAllBtn">📂 Expand All</button>
            <button id="collapseAllBtn">📁 Collapse All</button>
            <button id="refreshBtn">🔄 Refresh</button>
        </div>
        <div class="stats" id="stats">Loading...</div>
    </div>
    
    <div class="tree-container" id="treeContainer">
        <div class="loading">Loading clan tree from database...</div>
    </div>
</div>

<div id="nodeModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Add/Edit Clan</h3>
        <input type="text" id="nodeNameInput" placeholder="Clan name" autocomplete="off">
        <div>
            <button id="modalConfirm">Confirm</button>
            <button id="modalCancel">Cancel</button>
        </div>
    </div>
</div>

<div class="status" id="status">⚡ Ready</div>

<script>
    (function() {
        // ========== REPLACE WITH YOUR SUPABASE KEYS ==========
        const SUPABASE_URL = 'https://dzgaaoawkvqjuoecytko.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR6Z2Fhb2F3a3ZxanVvZWN5dGtvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5NTg3NDYsImV4cCI6MjA5NDUzNDc0Nn0.dO9kp9u23s0MnSzVZ8cIQYCzD926RdrEaMBG0POxJ8k';
        // =====================================================
        
        let supabaseClient = null;
        let clanData = [];
        let pendingAction = null;
        let pendingNode = null;
        
        function init() {
            if (SUPABASE_URL.includes('YOUR_SUPABASE')) {
                document.getElementById('treeContainer').innerHTML = '<div style="padding:40px;color:red;">❌ Please configure Supabase keys</div>';
                return;
            }
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            loadClanData();
            
            document.getElementById('expandAllBtn').onclick = expandAll;
            document.getElementById('collapseAllBtn').onclick = collapseAll;
            document.getElementById('refreshBtn').onclick = () => loadClanData();
            
            document.getElementById('modalConfirm').onclick = onModalConfirm;
            document.getElementById('modalCancel').onclick = () => {
                document.getElementById('nodeModal').style.display = 'none';
                pendingAction = null;
                pendingNode = null;
            };
        }
        
        async function loadClanData() {
            try {
                document.getElementById('status').innerHTML = '📡 Loading...';
                document.getElementById('stats').innerHTML = 'Loading...';
                document.getElementById('treeContainer').innerHTML = '<div style="padding:40px;text-align:center;">Loading clan tree...</div>';
                
                const { data, error } = await supabaseClient
                    .from('clan_paths')
                    .select('*')
                    .order('level_1', { ascending: true });
                
                if (error) throw error;
                
                clanData = data || [];
                document.getElementById('stats').innerHTML = `📊 ${clanData.length} clan paths`;
                document.getElementById('status').innerHTML = '✅ Loaded';
                renderTree();
                setTimeout(() => collapseAll(), 100);
                setTimeout(() => {
                    document.getElementById('status').style.opacity = '0.5';
                }, 2000);
            } catch (err) {
                console.error(err);
                document.getElementById('treeContainer').innerHTML = '<div style="padding:40px;color:red;">❌ Error: ' + err.message + '</div>';
                document.getElementById('status').innerHTML = '❌ Error';
            }
        }
        
        function buildTree() {
            const tree = {};
            clanData.forEach(path => {
                const levels = [];
                if (path.level_1) levels.push(path.level_1);
                if (path.level_2) levels.push(path.level_2);
                if (path.level_3) levels.push(path.level_3);
                if (path.level_4) levels.push(path.level_4);
                if (path.level_5) levels.push(path.level_5);
                if (path.level_6) levels.push(path.level_6);
                if (path.level_7) levels.push(path.level_7);
                
                let current = tree;
                levels.forEach((level, idx) => {
                    const full = levels.slice(0, idx + 1).join(' > ');
                    if (!current[level]) {
                        current[level] = { name: level, fullPath: full, children: {} };
                    }
                    current = current[level].children;
                });
            });
            return tree;
        }
        
        function renderTree() {
            const container = document.getElementById('treeContainer');
            const tree = buildTree();
            const rootNodes = Object.values(tree);
            
            if (rootNodes.length === 0) {
                container.innerHTML = '<div style="padding:40px;text-align:center;">No clan data found. Use "Add Root Clan" button to start.</div>';
                return;
            }
            
            let html = '<ul class="tree">';
            rootNodes.forEach(node => html += renderNode(node, 0));
            html += '</ul>';
            html += '<div class="root-actions"><button class="btn-add-root" id="addRootBtn">➕ Add New Root Clan</button></div>';
            container.innerHTML = html;
            
            // Expand/collapse handlers
            document.querySelectorAll('.toggle').forEach(toggle => {
                toggle.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const children = this.closest('.node').nextElementSibling;
                    if (children) {
                        children.classList.toggle('collapsed');
                        this.textContent = children.classList.contains('collapsed') ? '▶' : '▼';
                    }
                });
            });
            
            // Action buttons handlers
            document.querySelectorAll('.action-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const action = this.dataset.action;
                    const nodeDiv = this.closest('.node');
                    const clanName = nodeDiv.querySelector('.clan-name strong').textContent;
                    const fullPath = nodeDiv.dataset.fullpath;
                    
                    if (action === 'edit') {
                        openEditModal(clanName, fullPath);
                    } else if (action === 'addChild') {
                        openAddChildModal(clanName, fullPath);
                    } else if (action === 'addSpouse') {
                        openAddSpouseModal(clanName, fullPath);
                    } else if (action === 'addSibling') {
                        openAddSiblingModal(clanName, fullPath);
                    }
                });
            });
            
            // Long-press for mobile (reveal action buttons)
            document.querySelectorAll('.node').forEach(node => {
                let pressTimer;
                node.addEventListener('touchstart', function(e) {
                    pressTimer = setTimeout(() => {
                        const actions = this.querySelector('.action-buttons');
                        if (actions) actions.style.display = 'flex';
                        setTimeout(() => { if (actions) actions.style.display = 'none'; }, 3000);
                    }, 500);
                });
                node.addEventListener('touchend', () => clearTimeout(pressTimer));
                node.addEventListener('touchmove', () => clearTimeout(pressTimer));
            });
            
            document.getElementById('addRootBtn').onclick = () => openAddRootModal();
        }
        
        function renderNode(node, level) {
            const hasChildren = Object.keys(node.children).length > 0;
            const indent = level * 20;
            
            return `
                <li>
                    <div class="node" data-fullpath="${escapeHtml(node.fullPath)}" style="margin-left: ${indent}px;">
                        ${hasChildren ? '<span class="toggle">▼</span>' : '<span class="toggle" style="opacity:0.3;">●</span>'}
                        <span class="clan-name"><strong>${escapeHtml(node.name)}</strong></span>
                        ${hasChildren ? `<span class="badge">${Object.keys(node.children).length}</span>` : ''}
                        <div class="action-buttons">
                            <button class="action-btn edit" data-action="edit">✏️ Edit</button>
                            <button class="action-btn" data-action="addChild">➕ Child</button>
                            <button class="action-btn" data-action="addSpouse">💑 Spouse</button>
                            <button class="action-btn" data-action="addSibling">👥 Sibling</button>
                        </div>
                    </div>
                    ${hasChildren ? `<div class="children"><ul class="tree">${Object.values(node.children).map(child => renderNode(child, level + 1)).join('')}</ul></div>` : ''}
                </li>
            `;
        }
        
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
        
        function expandAll() {
            document.querySelectorAll('.children').forEach(el => el.classList.remove('collapsed'));
            document.querySelectorAll('.toggle').forEach(el => { if (el.textContent === '▶') el.textContent = '▼'; });
        }
        
        function collapseAll() {
            document.querySelectorAll('.children').forEach(el => el.classList.add('collapsed'));
            document.querySelectorAll('.toggle').forEach(el => { if (el.textContent === '▼') el.textContent = '▶'; });
        }
        
        // Modal actions
        function openEditModal(clanName, fullPath) {
            pendingAction = 'edit';
            pendingNode = { name: clanName, fullPath };
            document.getElementById('modalTitle').innerText = `✏️ Edit Clan: ${clanName}`;
            document.getElementById('nodeNameInput').value = clanName;
            document.getElementById('nodeModal').style.display = 'flex';
        }
        
        function openAddChildModal(parentName, parentPath) {
            pendingAction = 'addChild';
            pendingNode = { name: parentName, fullPath: parentPath };
            document.getElementById('modalTitle').innerText = `➕ Add Child to ${parentName}`;
            document.getElementById('nodeNameInput').value = '';
            document.getElementById('nodeModal').style.display = 'flex';
        }
        
        function openAddSpouseModal(clanName, clanPath) {
            pendingAction = 'addSpouse';
            pendingNode = { name: clanName, fullPath: clanPath };
            document.getElementById('modalTitle').innerText = `💑 Add Spouse for ${clanName}`;
            document.getElementById('nodeNameInput').value = '';
            document.getElementById('nodeModal').style.display = 'flex';
        }
        
        function openAddSiblingModal(siblingName, siblingPath) {
            pendingAction = 'addSibling';
            pendingNode = { name: siblingName, fullPath: siblingPath };
            document.getElementById('modalTitle').innerText = `👥 Add Sibling of ${siblingName}`;
            document.getElementById('nodeNameInput').value = '';
            document.getElementById('nodeModal').style.display = 'flex';
        }
        
        function openAddRootModal() {
            pendingAction = 'addRoot';
            pendingNode = null;
            document.getElementById('modalTitle').innerText = '➕ Add New Root Clan';
            document.getElementById('nodeNameInput').value = '';
            document.getElementById('nodeModal').style.display = 'flex';
        }
        
        async function onModalConfirm() {
            const newValue = document.getElementById('nodeNameInput').value.trim();
            if (!newValue) { alert('Please enter a clan name'); return; }
            document.getElementById('nodeModal').style.display = 'none';
            
            try {
                document.getElementById('status').innerHTML = '💾 Saving...';
                
                if (pendingAction === 'edit' && pendingNode) {
                    // Edit existing clan name - requires updating all paths containing this node
                    await editClanName(pendingNode.fullPath, pendingNode.name, newValue);
                } 
                else if (pendingAction === 'addChild' && pendingNode) {
                    const newPath = pendingNode.fullPath + ' > ' + newValue;
                    await addNewPath(newPath.split(' > '));
                }
                else if (pendingAction === 'addSpouse' && pendingNode) {
                    // Spouse is stored as a separate path with annotation
                    const spousePath = pendingNode.fullPath + ' (spouse of ' + pendingNode.name + ') > ' + newValue;
                    await addNewPath(spousePath.split(' > '));
                }
                else if (pendingAction === 'addSibling' && pendingNode) {
                    // Sibling - same parent path
                    const pathParts = pendingNode.fullPath.split(' > ');
                    pathParts.pop(); // remove current sibling name
                    pathParts.push(newValue);
                    await addNewPath(pathParts);
                }
                else if (pendingAction === 'addRoot') {
                    await addNewPath([newValue]);
                }
                
                document.getElementById('status').innerHTML = '✅ Saved! Reloading...';
                await loadClanData();
            } catch (err) {
                document.getElementById('status').innerHTML = '❌ ' + err.message;
            }
        }
        
        async function editClanName(oldFullPath, oldName, newName) {
            // Find all paths containing this node
            const pathsToUpdate = clanData.filter(row => {
                const levels = [];
                if (row.level_1) levels.push(row.level_1);
                if (row.level_2) levels.push(row.level_2);
                if (row.level_3) levels.push(row.level_3);
                if (row.level_4) levels.push(row.level_4);
                if (row.level_5) levels.push(row.level_5);
                if (row.level_6) levels.push(row.level_6);
                if (row.level_7) levels.push(row.level_7);
                return levels.includes(oldName);
            });
            
            for (const row of pathsToUpdate) {
                const newRow = { ...row };
                if (newRow.level_1 === oldName) newRow.level_1 = newName;
                if (newRow.level_2 === oldName) newRow.level_2 = newName;
                if (newRow.level_3 === oldName) newRow.level_3 = newName;
                if (newRow.level_4 === oldName) newRow.level_4 = newName;
                if (newRow.level_5 === oldName) newRow.level_5 = newName;
                if (newRow.level_6 === oldName) newRow.level_6 = newName;
                if (newRow.level_7 === oldName) newRow.level_7 = newName;
                
                const { error } = await supabaseClient.from('clan_paths').update(newRow).eq('id', row.id);
                if (error) throw error;
            }
        }
        
        async function addNewPath(pathArray) {
            const newRow = {
                level_1: pathArray[0] || null, level_2: pathArray[1] || null,
                level_3: pathArray[2] || null, level_4: pathArray[3] || null,
                level_5: pathArray[4] || null, level_6: pathArray[5] || null,
                level_7: pathArray[6] || null
            };
            const { error } = await supabaseClient.from('clan_paths').insert([newRow]);
            if (error) throw error;
        }
        
        init();
    })();
</script>

</body>
</html>
